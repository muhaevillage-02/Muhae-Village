<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>이장님댁 — 무해한 마을</title>

<meta name="description" content="20대 성장 소셜 플랫폼, 무해한 마을">
<meta property="og:type" content="website">
<meta property="og:url" content="https://muhaevillage.co.kr/community_center">
<meta property="og:title" content="이장님댁 — 무해한 마을">
<meta property="og:description" content="20대 성장 소셜 플랫폼, 무해한 마을">
<meta property="og:image" content="https://cdn.imweb.me/upload/S20260131b6d309cd641c4/0da8e12c38c38.png">
<meta name="theme-color" content="#c2f1af">

<link rel="icon" type="image/png" href="https://cdn.imweb.me/thumbnail/20260227/0af01ef742930.png" sizes="196x196">
<link rel="apple-touch-icon-precomposed" sizes="152x152" href="https://cdn.imweb.me/thumbnail/20260227/2d04f95d92525.png">

<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">

<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

:root {
  --green:      #c2f1af;
  --brown:      #7e1e00;
  --cream:      #faf6eb;
  --cream-dark: #f0eada;
  --text-main:  #3a2a1a;
}

body {
  font-family: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif;
  background: var(--cream-dark);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* ── 헤더 ── */
.site-header {
  background: var(--green);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px 20px;
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1.5px solid rgba(126,30,0,0.1);
}
.site-header a.back {
  position: absolute;
  left: 16px;
  font-size: 13px;
  font-weight: 600;
  color: var(--brown);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 4px;
}
.site-header a.back svg { width: 16px; height: 16px; }
.header-logo {
  display: flex;
  align-items: center;
  text-decoration: none;
}
.header-logo img { height: 32px; width: auto; }

/* ── 마을 래퍼 (배경 이미지) ── */
.village-wrapper {
  position: relative;
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
  aspect-ratio: 16 / 9;
  background-image: url('https://i.ifh.cc/5R7nYs.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  border-radius: 20px;
  overflow: hidden;
}

/* ── 버튼 컨테이너 ── */
.village-btn-container {
  position: absolute;
  top: 62%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 3vw;
  width: 100%;
}

/* ── 공통 버튼 스타일 ── */
.bbo-yong-btn {
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  width: 255px;
  height: 255px;
  border: none;
  cursor: pointer;
  text-decoration: none;
  outline: none;
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s;
  border-radius: 40px;
  box-shadow: 0 8px 15px rgba(0,0,0,0.05);
}

.bbo-yong-btn:hover {
  transform: scale(1.08) translateY(-8px);
  box-shadow: 0 12px 25px rgba(0,0,0,0.1);
}

.btn-intro  { background-color: #eef4d7; }
.btn-notice { background-color: #fdf6d4; }

/* ── 버튼 내부 텍스트 배지 ── */
.btn-badge {
  background-color: #ffffff;
  color: #5a4031;
  font-size: 20px;
  font-weight: 800;
  padding: 8px 24px;
  border-radius: 20px;
  margin-bottom: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.04);
}

/* ── 버튼 내부 이모지 ── */
.btn-emoji {
  font-size: 90px;
  line-height: 1;
  filter: drop-shadow(0px 10px 10px rgba(0,0,0,0.15));
}

/* ── 팝업 오버레이 ── */
.village-popup-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.5);
  z-index: 99999;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.village-popup-content {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.8);
  background-color: #ffffff;
  padding: 40px 30px;
  border-radius: 25px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  width: 90%;
  max-width: 320px;
}

.village-popup-overlay.show {
  display: block;
  opacity: 1;
}

.village-popup-overlay.show .village-popup-content {
  transform: translate(-50%, -50%) scale(1);
}

.village-popup-text {
  font-size: 22px;
  font-weight: 900;
  color: #5a4031;
  line-height: 1.5;
  margin-bottom: 25px;
  word-break: keep-all;
}

.village-popup-close {
  background-color: #c5d882;
  color: #4a5c28;
  border: none;
  padding: 12px 35px;
  font-size: 18px;
  font-weight: 800;
  border-radius: 12px;
  cursor: pointer;
  transition: background-color 0.2s, transform 0.2s;
}

.village-popup-close:hover {
  background-color: #b0c46a;
  transform: scale(1.05);
}

/* ── 푸터 ── */
.site-footer {
  background: var(--green);
  color: var(--brown);
  text-align: center;
  padding: 20px 16px;
  font-size: 12px;
  line-height: 1.8;
  margin-top: 0;
}
.site-footer a {
  color: var(--brown);
  text-decoration: none;
}
.site-footer a:hover { text-decoration: underline; }

/* ── 모바일 반응형 ── */
@media (max-width: 768px) {
  .village-btn-container {
    top: 61%;
    gap: 3vw;
  }
  .bbo-yong-btn {
    width: 22vw;
    height: 22vw;
    max-width: 100px;
    max-height: 100px;
    border-radius: 18px;
  }
  .btn-badge {
    font-size: 11px;
    padding: 4px 10px;
    margin-bottom: 5px;
    border-radius: 12px;
  }
  .btn-emoji {
    font-size: 35px;
  }
  .village-popup-text {
    font-size: 18px;
  }
}
</style>
</head>
<body>

<!-- 헤더 -->
<header class="site-header">
  <a class="back" href="/index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    마을
  </a>
  <a class="header-logo" href="/index.html">
    <img src="https://cdn.imweb.me/upload/S20260131b6d309cd641c4/c590d1d79bbac.png" alt="무해한 마을">
  </a>
</header>

<!-- 마을 메인 섹션 -->
<div class="village-wrapper">
  <div class="village-btn-container">

    <!-- 마을소개 버튼 -->
    <a href="/town_info.html" class="bbo-yong-btn btn-intro">
      <span class="btn-badge">마을소개</span>
      <span class="btn-emoji">&#x1F4A1;</span>
    </a>

    <!-- 공지사항 버튼 -->
    <button type="button" class="bbo-yong-btn btn-notice" onclick="openVillagePopup()">
      <span class="btn-badge">공지사항</span>
      <span class="btn-emoji">&#x1F4E2;</span>
    </button>

  </div>
</div>

<!-- 팝업 -->
<div id="villageNoticePopup" class="village-popup-overlay">
  <div class="village-popup-content">
    <p class="village-popup-text">아직 준비중이에요<br>다음에 다시 만나요!</p>
    <button class="village-popup-close" onclick="closeVillagePopup()">닫기</button>
  </div>
</div>

<!-- 푸터 -->
<footer class="site-footer">
  <p>비지니스 문의 | <a href="mailto:Muhaevillage@gmail.com">Muhaevillage@gmail.com</a></p>
  <p>인스타그램 | @muhae_village</p>
  <p style="margin-top: 8px; opacity: 0.7;">Copyright &copy; 2026 무해한 마을 All rights reserved.</p>
</footer>

<script>
function openVillagePopup() {
  var popup = document.getElementById('villageNoticePopup');
  popup.style.display = 'block';
  requestAnimationFrame(function() {
    popup.classList.add('show');
  });
}

function closeVillagePopup() {
  var popup = document.getElementById('villageNoticePopup');
  popup.classList.remove('show');
  setTimeout(function() {
    if (!popup.classList.contains('show')) {
      popup.style.display = 'none';
    }
  }, 300);
}

window.onclick = function(event) {
  var popup = document.getElementById('villageNoticePopup');
  if (event.target == popup) {
    closeVillagePopup();
  }
};
</script>

</body>
</html>
