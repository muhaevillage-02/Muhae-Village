<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

:root {
  --green:      #c2f1af;
  --green-dark: #8dd67a;
  --brown:      #7e1e00;
  --cream:      #faf6eb;
  --cream-dark: #f0eada;
  --text-main:  #3a2a1a;
  --text-sub:   #7a6a5a;
}

body {
  font-family: 'Pretendard Variable', 'Pretendard', -apple-system, sans-serif;
  background: var(--cream-dark);
  -webkit-font-smoothing: antialiased;
}

/* ── 헤더 ── */
.site-header {
  background: var(--green);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px 20px;
  position: sticky;
  top: 0;
  z-index: 100;
  border-bottom: 1.5px solid rgba(126,30,0,0.1);
}
.site-header a.back {
  position: absolute;
  left: 16px;
  font-size: 13px;
  font-weight: 600;
  color: var(--brown);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 4px;
}
.site-header a.back svg { width: 16px; height: 16px; }
.header-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
}
.header-logo img { height: 32px; width: auto; }

/* ── 이미지 스택 ── */
.image-stack {
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
}

.image-stack img {
  display: block;
  width: 100%;
  height: auto;
}

/* ── 푸터 ── */
.site-footer {
  background: var(--green);
  color: var(--brown);
  text-align: center;
  padding: 20px 16px;
  font-size: 12px;
  line-height: 1.8;
}
.site-footer a {
  color: var(--brown);
  text-decoration: none;
}
.site-footer a:hover { text-decoration: underline; }
</style>
</head>

<!-- 헤더 -->
<header class="site-header">
  <a class="back" href="/community_center.html">

  </a>
</header>

<!-- 마을 소개 이미지 3장 -->
<main class="image-stack">

  <img src="https://cdn.imweb.me/thumbnail/20260226/6b19a6084b3e1.png" alt="무해한 마을 소개 2" loading="lazy">
